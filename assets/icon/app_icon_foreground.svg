<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="mountainGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6B8E5F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A6741;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mountainGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8BA37A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B8E5F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="snowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F0F8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Scale down to ~72% and center for Android adaptive icon safe zone -->
  <g transform="translate(72, 72) scale(0.72)">
    <!-- Back mountain (right) -->
    <path d="M290 400 L420 400 L355 200 Z" fill="url(#mountainGradient2)"/>
    
    <!-- Main mountain (center) -->
    <path d="M80 400 L256 100 L432 400 Z" fill="url(#mountainGradient1)"/>
    
    <!-- Snow cap on main mountain -->
    <path d="M256 100 L215 170 L238 170 L225 195 L256 195 L256 195 L287 195 L274 170 L297 170 Z" fill="url(#snowGradient)"/>
    
    <!-- Front mountain (left small) -->
    <path d="M30 400 L140 260 L250 400 Z" fill="url(#mountainGradient2)" opacity="0.85"/>
    
    <!-- Height indicator line -->
    <line x1="400" y1="120" x2="400" y2="360" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Height indicator tick marks -->
    <line x1="382" y1="120" x2="418" y2="120" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
    <line x1="388" y1="180" x2="412" y2="180" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="382" y1="240" x2="418" y2="240" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
    <line x1="388" y1="300" x2="412" y2="300" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="382" y1="360" x2="418" y2="360" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Location pin -->
    <g transform="translate(440, 100)">
      <circle cx="0" cy="0" r="24" fill="#FF6B6B"/>
      <circle cx="0" cy="0" r="10" fill="#FFFFFF"/>
    </g>
  </g>
</svg>
