<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5A8E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mountainGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6B8E5F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A6741;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mountainGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8BA37A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B8E5F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="snowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F0F8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Full square background -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bgGradient)"/>
  
  <!-- Back mountain (right) -->
  <path d="M280 380 L400 380 L340 200 Z" fill="url(#mountainGradient2)"/>
  
  <!-- Main mountain (center) -->
  <path d="M100 380 L256 120 L412 380 Z" fill="url(#mountainGradient1)"/>
  
  <!-- Snow cap on main mountain -->
  <path d="M256 120 L220 180 L240 180 L230 200 L256 200 L256 200 L282 200 L272 180 L292 180 Z" fill="url(#snowGradient)"/>
  
  <!-- Front mountain (left small) -->
  <path d="M50 380 L150 260 L250 380 Z" fill="url(#mountainGradient2)" opacity="0.85"/>
  
  <!-- Height indicator line -->
  <line x1="380" y1="140" x2="380" y2="340" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Height indicator tick marks -->
  <line x1="365" y1="140" x2="395" y2="140" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <line x1="370" y1="190" x2="390" y2="190" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="365" y1="240" x2="395" y2="240" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <line x1="370" y1="290" x2="390" y2="290" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="365" y1="340" x2="395" y2="340" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Location pin -->
  <g transform="translate(420, 125)">
    <circle cx="0" cy="0" r="20" fill="#FF6B6B"/>
    <circle cx="0" cy="0" r="8" fill="#FFFFFF"/>
  </g>
</svg>
