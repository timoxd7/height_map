name: height_map
description: "A modern height map app that displays altitude from multiple sensors and allows exploring elevations on an interactive world map."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^15.1.2

  # Networking
  dio: ^5.8.0

  # Maps
  flutter_map: ^8.1.1
  latlong2: ^0.9.1

  # Location & Sensors
  geolocator: ^14.0.0
  sensors_plus: ^6.1.1
  permission_handler: ^12.0.0

  # Dependency Injection
  get_it: ^8.0.3

  # Functional Programming
  dartz: ^0.10.1

  # Code Generation (runtime)
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation (build time)
  build_runner: ^2.4.14
  freezed: ^3.0.6
  json_serializable: ^6.9.4

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

