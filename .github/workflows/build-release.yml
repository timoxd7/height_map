name: Build and Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tag generation
      
      - name: Get latest tag and calculate next version
        id: version
        run: |
          # Get all tags starting with 'v' followed by a number
          LATEST_TAG=$(git tag -l "v[0-9]*" | sort -V | tail -n 1)
          
          if [ -z "$LATEST_TAG" ]; then
            # No tags found, start with v1
            NEXT_TAG="v1"
            LAST_TAG_FOR_CHANGELOG=""
          else
            # Extract number from tag and increment
            VERSION_NUM=$(echo $LATEST_TAG | sed 's/v//')
            NEXT_VERSION=$((VERSION_NUM + 1))
            NEXT_TAG="v${NEXT_VERSION}"
            LAST_TAG_FOR_CHANGELOG=$LATEST_TAG
          fi
          
          echo "next_tag=${NEXT_TAG}" >> $GITHUB_OUTPUT
          echo "last_tag=${LAST_TAG_FOR_CHANGELOG}" >> $GITHUB_OUTPUT
          echo "Next version will be: ${NEXT_TAG}"
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build universal APK
        run: flutter build apk --release
      
      - name: Build ABI split APKs
        run: flutter build apk --release --split-per-abi
      
      - name: Rename APK files
        run: |
          # Rename universal APK
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/height-map-${{ steps.version.outputs.next_tag }}-universal.apk
          
          # Rename split APKs if they exist
          if [ -f build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk ]; then
            cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
               build/app/outputs/flutter-apk/height-map-${{ steps.version.outputs.next_tag }}-armeabi-v7a.apk
          fi
          
          if [ -f build/app/outputs/flutter-apk/app-arm64-v8a-release.apk ]; then
            cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
               build/app/outputs/flutter-apk/height-map-${{ steps.version.outputs.next_tag }}-arm64-v8a.apk
          fi
          
          if [ -f build/app/outputs/flutter-apk/app-x86_64-release.apk ]; then
            cp build/app/outputs/flutter-apk/app-x86_64-release.apk \
               build/app/outputs/flutter-apk/height-map-${{ steps.version.outputs.next_tag }}-x86_64.apk
          fi
      
      - name: Generate changelog
        id: changelog
        run: |
          if [ -z "${{ steps.version.outputs.last_tag }}" ]; then
            # First release, get all commits
            CHANGELOG=$(git log --oneline --pretty=format:"- %s (%h)" | head -20)
            echo "## Changes" > changelog.txt
            echo "" >> changelog.txt
            echo "Initial release" >> changelog.txt
            echo "" >> changelog.txt
            echo "### Recent Commits" >> changelog.txt
            echo "$CHANGELOG" >> changelog.txt
          else
            # Get PRs and commits since last tag
            echo "## Changes since ${{ steps.version.outputs.last_tag }}" > changelog.txt
            echo "" >> changelog.txt
            
            # Try to get merged PRs info
            echo "### Pull Requests" >> changelog.txt
            git log ${{ steps.version.outputs.last_tag }}..HEAD --oneline --grep="Merge pull request" --pretty=format:"- %s" >> changelog.txt || true
            echo "" >> changelog.txt
            
            echo "" >> changelog.txt
            echo "### Commits" >> changelog.txt
            git log ${{ steps.version.outputs.last_tag }}..HEAD --oneline --pretty=format:"- %s (%h)" >> changelog.txt
          fi
          
          cat changelog.txt
      
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.next_tag }}
          name: Release ${{ steps.version.outputs.next_tag }}
          body_path: changelog.txt
          draft: false
          prerelease: false
          files: |
            build/app/outputs/flutter-apk/height-map-${{ steps.version.outputs.next_tag }}-universal.apk
            build/app/outputs/flutter-apk/height-map-${{ steps.version.outputs.next_tag }}-arm64-v8a.apk
            build/app/outputs/flutter-apk/height-map-${{ steps.version.outputs.next_tag }}-armeabi-v7a.apk
            build/app/outputs/flutter-apk/height-map-${{ steps.version.outputs.next_tag }}-x86_64.apk
          fail_on_unmatched_files: false
      
      - name: Cleanup artifacts
        if: always()
        run: |
          # Clean up build outputs and temporary files
          rm -rf build/app/outputs/flutter-apk/*.apk
          rm -f changelog.txt
          echo "Artifacts cleaned up"
